<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouisGPT | Obsidian Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fbbf24; --bg: #080808; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .panel { background: rgba(20, 20, 20, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); }
        .glow-amber { box-shadow: 0 0 20px rgba(251, 191, 36, 0.15); }
        
        /* Custom Scrollbar */
        .scroller::-webkit-scrollbar { width: 3px; }
        .scroller::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .scroller::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Animation d'entrée des messages */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .msg-anim { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 flex items-center justify-between px-6 border-b border-white/5 panel">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 rounded-full bg-amber-400 animate-pulse glow-amber"></div>
            <span class="text-xs font-bold tracking-[0.2em] mono uppercase text-gray-400">RouisGPT_v3.0.1</span>
        </div>
        <button onclick="openConfig()" class="text-[10px] mono border border-white/10 px-3 py-1 rounded hover:bg-white/5 transition">CONFIG_SYSTEM</button>
    </header>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 scroller">
            <div id="init-view" class="h-full flex flex-col items-center justify-center text-center opacity-40">
                <div class="text-5xl mb-6">🛰️</div>
                <h2 class="text-xl font-light tracking-widest uppercase">Liaison Satellite Établie</h2>
                <p class="text-[10px] mono mt-2">Prêt pour l'exécution des requêtes.</p>
            </div>
        </div>

        <div id="img-prev" class="hidden px-12 mb-4">
            <div class="relative inline-block group">
                <img id="render-prev" src="" class="h-24 rounded-xl border border-amber-400/50">
                <button onclick="dropImg()" class="absolute -top-2 -right-2 bg-red-500 rounded-full w-5 h-5 text-[10px] flex items-center justify-center">×</button>
            </div>
        </div>

        <footer class="p-6 md:p-10 bg-gradient-to-t from-black to-transparent">
            <div class="max-w-4xl mx-auto panel rounded-2xl p-2 flex items-end gap-3 ring-1 ring-white/10 focus-within:ring-amber-400/40 transition-all">
                <button onclick="document.getElementById('file-up').click()" class="p-4 text-gray-500 hover:text-amber-400 transition">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m21 15-3-3-2 2-4-4-6 6"/></svg>
                </button>
                <input type="file" id="file-up" class="hidden" accept="image/*" onchange="loadImg(event)">
                
                <textarea id="prompt-in" rows="1" placeholder="Entrez votre commande..." class="flex-1 bg-transparent p-4 outline-none resize-none mono text-sm" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                
                <button onclick="startProcess()" class="bg-amber-400 text-black px-8 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest hover:scale-[1.02] transition active:scale-95">
                    Envoyer
                </button>
            </div>
        </footer>
    </main>

    <div id="config-ui" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="w-full max-w-sm panel p-8 rounded-3xl border-amber-400/20">
            <h3 class="text-lg font-bold mb-6 text-amber-400 uppercase tracking-tighter">Configuration API</h3>
            <input type="password" id="api-key" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-amber-400 transition text-sm mono mb-4" placeholder="Collez votre clé AIzaSy...">
            <button onclick="saveAndGo()" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-amber-400 transition uppercase text-xs">Valider la connexion</button>
        </div>
    </div>

    <script>
        let tempImg = null;

        function openConfig() { document.getElementById('config-ui').classList.remove('hidden'); }
        function saveAndGo() {
            const key = document.getElementById('api-key').value.trim();
            if(key) { localStorage.setItem('r_key', key); document.getElementById('config-ui').classList.add('hidden'); }
        }

        function loadImg(e) {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = (ev) => {
                tempImg = ev.target.result;
                document.getElementById('render-prev').src = tempImg;
                document.getElementById('img-prev').classList.remove('hidden');
            };
            r.readAsDataURL(f);
        }

        function dropImg() {
            tempImg = null;
            document.getElementById('img-prev').classList.add('hidden');
            document.getElementById('file-up').value = '';
        }

        async function startProcess() {
            const input = document.getElementById('prompt-in');
            const txt = input.value.trim();
            const key = localStorage.getItem('r_key');

            if(!key) return openConfig();
            if(!txt && !tempImg) return;

            document.getElementById('init-view').style.display = 'none';
            addBubble('user', txt, tempImg);
            input.value = '';
            const loadId = addLoading();
            const imgToPass = tempImg;
            dropImg();

            try {
                // FORCE LA VERSION 1 STABLE - La plus compatible
                const model = "gemini-1.5-flash";
                const url = `https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${key}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: txt || "Analyse de cette image." },
                            ...(imgToPass ? [{ inline_data: { mime_type: "image/jpeg", data: imgToPass.split(',')[1] } }] : [])
                        ]
                    }]
                };

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                
                if(data.error) {
                    // TENTATIVE DE SECOURS (Si v1 échoue, on tente v1beta)
                    console.log("Essai secours v1beta...");
                    const backupUrl = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                    const backupRes = await fetch(backupUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const backupData = await backupRes.json();
                    
                    if(backupData.error) throw new Error(backupData.error.message);
                    renderAI(backupData, loadId);
                } else {
                    renderAI(data, loadId);
                }

            } catch (err) {
                document.getElementById(loadId).innerHTML = `<div class="text-red-500 text-[10px] mono">CRITICAL_ERR: ${err.message}</div>`;
            }
        }

        function renderAI(data, loadId) {
            const text = data.candidates[0].content.parts[0].text;
            document.getElementById(loadId).remove();
            addBubble('ai', text);
        }

        function addBubble(role, text, img) {
            const box = document.getElementById('chat-box');
            const d = document.createElement('div');
            d.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} msg-anim`;
            d.innerHTML = `
                <div class="max-w-[85%] p-5 rounded-3xl ${role === 'user' ? 'bg-amber-400 text-black rounded-br-none' : 'panel text-gray-200 rounded-tl-none border-white/10'} shadow-2xl">
                    ${img ? `<img src="${img}" class="rounded-xl mb-3 max-h-60 w-full object-cover">` : ''}
                    <p class="text-sm leading-relaxed whitespace-pre-wrap">${text}</p>
                </div>`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        function addLoading() {
            const id = 'ld-' + Date.now();
            const box = document.getElementById('chat-box');
            const d = document.createElement('div');
            d.id = id;
            d.className = "flex justify-start animate-pulse";
            d.innerHTML = `<div class="panel
