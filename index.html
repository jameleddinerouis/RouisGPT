<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouisGPT | Next-Gen AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050914; color: #e2e8f0; }
        .glass { background: rgba(10, 16, 34, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .yellow-glow { box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        .typing-dot { width: 6px; height: 6px; background: #fbbf24; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <aside class="w-full md:w-72 bg-[#0a1022] border-r border-[#1a2542] flex flex-col p-4">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-extrabold text-[#fbbf24]">Rouis<span class="text-white">GPT</span></h1>
            <button onclick="toggleSettings()" class="text-gray-400 hover:text-white">⚙️</button>
        </div>
        <a href="offres.html" class="mb-4 p-3 bg-[#1a2542] rounded-xl text-center text-sm hover:bg-[#fbbf24] hover:text-black transition font-bold">🛒 Boutique Brawl Stars</a>
        <div id="history" class="flex-1 overflow-y-auto space-y-2 text-xs text-gray-500">
            </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <div id="modal" class="absolute inset-0 z-50 bg-black/70 flex items-center justify-center hidden backdrop-blur-md">
            <div class="glass p-8 rounded-3xl w-80 text-center">
                <h2 class="text-[#fbbf24] font-bold mb-4">CLÉ API GOOGLE</h2>
                <input type="password" id="key-input" placeholder="AIzaSy..." class="w-full bg-black border border-[#1a2542] p-3 rounded-lg text-white mb-4 outline-none focus:border-[#fbbf24]">
                <button onclick="saveKey()" class="w-full bg-[#fbbf24] text-black font-bold py-2 rounded-lg">ACTIVER</button>
            </div>
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6">
            <div class="text-center py-20 opacity-50">
                <p class="text-4xl mb-4">🤖</p>
                <p>Système prêt. Pose-moi une question ou envoie une image.</p>
            </div>
        </div>

        <footer class="p-6">
            <div class="max-w-4xl mx-auto glass rounded-2xl p-2 flex items-center gap-2 yellow-glow">
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile(event)">
                <button onclick="document.getElementById('file-input').click()" class="p-3 hover:bg-white/10 rounded-xl transition">🖼️</button>
                <textarea id="user-input" rows="1" placeholder="Écris ici..." class="flex-1 bg-transparent p-3 outline-none resize-none"></textarea>
                <button onclick="send()" class="bg-[#fbbf24] text-black p-3 rounded-xl font-bold hover:scale-105 transition">ENVOYER</button>
            </div>
            <div id="preview-area" class="mt-2 flex justify-center hidden">
                <img id="img-preview" src="" class="h-20 rounded-lg border border-[#fbbf24]">
            </div>
        </footer>
    </main>

    <script>
        let currentImgBase64 = null;

        function toggleSettings() { document.getElementById('modal').classList.toggle('hidden'); }
        
        function saveKey() {
            const key = document.getElementById('key-input').value.trim();
            if(key) { localStorage.setItem('rouis_key', key); toggleSettings(); alert("Clé activée !"); }
        }

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                currentImgBase64 = event.target.result;
                document.getElementById('img-preview').src = currentImgBase64;
                document.getElementById('preview-area').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function send() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            const key = localStorage.getItem('rouis_key');
            
            if(!key) return toggleSettings();
            if(!text && !currentImgBase64) return;

            appendMsg('user', text, currentImgBase64);
            input.value = "";
            const loadingId = appendLoading();
            
            try {
                // Correction de l'URL pour éviter la 404
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                let parts = [{ text: text || "Analyse cette image." }];
                if(currentImgBase64) {
                    parts.push({ inline_data: { mime_type: "image/jpeg", data: currentImgBase64.split(',')[1] } });
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: parts }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const aiResponse = data.candidates[0].content.parts[0].text;
                document.getElementById(loadingId).remove();
                appendMsg('model', aiResponse);
                
                // Reset image
                currentImgBase64 = null;
                document.getElementById('preview-area').classList.add('hidden');
            } catch (err) {
                document.getElementById(loadingId).innerHTML = `<span class="text-red-500">Erreur : ${err.message}</span>`;
            }
        }

        function appendMsg(role, text, img) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="max-w-[85%] p-4 rounded-2xl ${role === 'user' ? 'bg-[#fbbf24] text-black' : 'bg-[#1a2542] text-white'} shadow-lg">
                    ${img ? `<img src="${img}" class="h-40 rounded-lg mb-2">` : ''}
                    <p class="text-sm whitespace-pre-wrap">${text}</p>
                </div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function appendLoading() {
            const id = 'l-' + Date.now();
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.id = id;
            div.innerHTML = `<div class="bg-[#1a2542] p-4 rounded-2xl inline-flex gap-1"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            box.appendChild(div);
            return id;
        }
    </script>
</body>
</html>
