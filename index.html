<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouisGPT | Interface Neuronale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050914; color: #e2e8f0; }
        .glass { background: rgba(10, 16, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .yellow-glow { box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
        .yellow-text-glow { text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        
        /* Animation de chargement style IA */
        .typing-dot { width: 6px; height: 6px; background: #fbbf24; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

        /* Scrollbar stylisée */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050914; }
        ::-webkit-scrollbar-thumb { background: #1a2542; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #fbbf24; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-72 bg-[#0a1022] border-r border-[#1a2542] flex flex-col hidden md:flex">
        <div class="p-6">
            <h1 class="text-2xl font-extrabold text-[#fbbf24] tracking-tighter yellow-text-glow">Rouis<span class="text-white">GPT</span></h1>
        </div>
        
        <button onclick="newChat()" class="mx-4 flex items-center justify-center gap-2 p-3 rounded-xl border border-dashed border-[#303f66] hover:border-[#fbbf24] text-sm transition-all hover:bg-[#fbbf24]/5">
            <span>+</span> Nouveau Chat
        </button>

        <div id="history-list" class="flex-1 overflow-y-auto mt-6 px-4 space-y-2">
            </div>

        <div class="p-4 border-t border-[#1a2542]">
            <button onclick="toggleSettings()" class="flex items-center gap-3 text-sm text-gray-400 hover:text-white transition">
                <span>⚙️</span> Paramètres IA
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        
        <div id="settings-modal" class="absolute inset-0 z-50 bg-black/60 flex items-center justify-center hidden backdrop-blur-sm">
            <div class="glass w-full max-w-md p-8 rounded-3xl yellow-glow">
                <h2 class="text-xl font-bold mb-6 text-[#fbbf24]">Configuration du Cerveau</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Clé API Gemini</label>
                        <input type="password" id="api-key-input" placeholder="Colle ta clé ici..." class="w-full bg-black border border-[#303f66] p-3 rounded-xl outline-none focus:border-[#fbbf24] transition">
                        <p class="text-[10px] text-gray-600 mt-2">Ta clé est stockée localement dans ton navigateur.</p>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Créativité (Température)</label>
                        <input type="range" id="temp-range" min="0" max="1" step="0.1" value="0.7" class="w-full accent-[#fbbf24]">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full mt-8 bg-[#fbbf24] text-[#050914] font-bold py-3 rounded-xl hover:scale-[1.02] transition-transform">SAUVEGARDER</button>
            </div>
        </div>

        <header class="md:hidden p-4 border-b border-[#1a2542] flex justify-between items-center glass">
            <span class="font-bold text-[#fbbf24]">RouisGPT</span>
            <button onclick="toggleSettings()">⚙️</button>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8">
            <div class="max-w-3xl mx-auto text-center py-20" id="welcome-screen">
                <div class="text-6xl mb-6 animate-bounce">🧠</div>
                <h2 class="text-4xl font-bold mb-4">Système RouisGPT Initialisé</h2>
                <p class="text-gray-500">Prêt pour une analyse de données ou une vision Nano Banana.</p>
            </div>
        </div>

        <footer class="p-4 md:p-8 bg-gradient-to-t from-[#050914] to-transparent">
            <div class="max-w-4xl mx-auto relative glass rounded-3xl p-2 border border-[#303f66] focus-within:border-[#fbbf24] transition-all yellow-glow">
                
                <div id="image-preview" class="hidden px-4 py-2">
                    <div class="relative inline-block">
                        <img id="preview-img" src="" class="h-20 w-20 object-cover rounded-xl border border-[#fbbf24]">
                        <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs">×</button>
                    </div>
                </div>

                <div class="flex items-end gap-2">
                    <button onclick="document.getElementById('file-input').click()" class="p-4 text-gray-500 hover:text-[#fbbf24] transition">
                        🖼️
                    </button>
                    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewImage(event)">
                    
                    <textarea id="user-input" rows="1" placeholder="Demande n'importe quoi..." class="w-full bg-transparent p-4 outline-none resize-none max-h-48 text-white"></textarea>
                    
                    <button onclick="handleSend()" id="send-btn" class="bg-[#fbbf24] text-[#050914] p-4 rounded-2xl font-bold hover:scale-110 transition-all active:scale-95">
                        ➜
                    </button>
                </div>
            </div>
            <p class="text-center text-[10px] text-gray-600 mt-4">RouisGPT v1.0 • Propulsé par Gemini Pro Vision</p>
        </footer>
    </main>

    <script>
        // --- LOGIQUE CORE ---
        let chatHistory = JSON.parse(localStorage.getItem('rouis_history')) || [];
        let currentImage = null;

        // Initialisation
        window.onload = () => {
            document.getElementById('api-key-input').value = localStorage.getItem('gemini_key') || '';
            renderHistory();
        };

        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
        }

        function saveSettings() {
            const key = document.getElementById('api-key-input').value;
            localStorage.setItem('gemini_key', key);
            toggleSettings();
            alert("Système mis à jour avec succès.");
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImage = e.target.result;
                    document.getElementById('preview-img').src = currentImage;
                    document.getElementById('image-preview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function clearImage() {
            currentImage = null;
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('file-input').value = "";
        }

        // --- APPEL API ---
        async function handleSend() {
            const prompt = document.getElementById('user-input').value.trim();
            const key = localStorage.getItem('gemini_key');

            if (!key) return alert("Configure ta clé API dans les réglages !");
            if (!prompt && !currentImage) return;

            document.getElementById('welcome-screen').style.display = 'none';
            appendMessage('user', prompt, currentImage);
            document.getElementById('user-input').value = "";
            
            const loadingId = appendLoading();

            try {
                // Si image -> Flash (Vision), sinon -> Pro
                const model = currentImage ? "gemini-1.5-flash" : "gemini-1.5-pro";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                
                let body;
                if (currentImage) {
                    body = {
                        contents: [{
                            parts: [
                                { text: prompt || "Analyse cette image." },
                                { inline_data: { mime_type: "image/jpeg", data: currentImage.split(',')[1] } }
                            ]
                        }]
                    };
                } else {
                    body = { contents: [{ parts: [{ text: prompt }] }] };
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                removeLoading(loadingId);
                appendMessage('model', aiText);
                saveToHistory(prompt, aiText);
                clearImage();

            } catch (error) {
                console.error(error);
                removeLoading(loadingId);
                appendMessage('model', "Erreur fatale de connexion. Vérifie ta clé API.");
            }
        }

        // --- UI HELPERS ---
        function appendMessage(role, text, img = null) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;
            
            div.innerHTML = `
                <div class="max-w-[80%] p-4 rounded-2xl ${role === 'user' ? 'bg-[#fbbf24] text-[#050914] rounded-tr-none' : 'glass text-gray-100 rounded-tl-none border-[#303f66]'}">
                    ${img ? `<img src="${img}" class="rounded-lg mb-2 max-h-60">` : ''}
                    <p class="text-sm leading-relaxed">${text}</p>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function appendLoading() {
            const id = 'load-' + Date.now();
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start";
            div.innerHTML = `
                <div class="glass p-4 rounded-2xl flex gap-1">
                    <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(div);
            return id;
        }

        function removeLoading(id) {
            document.getElementById(id).remove();
        }

        function saveToHistory(q, a) {
            chatHistory.unshift({ q: q.substring(0, 30), fullQ: q, a: a, time: new Date().toLocaleTimeString() });
            localStorage.setItem('rouis_history', JSON.stringify(chatHistory.slice(0, 10)));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = chatHistory.map(item => `
                <div class="p-3 text-xs text-gray-500 hover:bg-[#1a2542] rounded-lg cursor-pointer truncate transition">
                    🗨️ ${item.q || "Analyse Image"}
                </div>
            `).join('');
        }

        function newChat() {
            location.reload();
        }
    </script>

</body>
</html>
