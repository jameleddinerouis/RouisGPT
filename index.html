<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouisGPT | Infinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fbbf24; --dark: #020202; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: #fff; overflow: hidden; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.03); }
        .sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 300px; }
        .msg-user { background: var(--accent); color: #000; border-radius: 24px 24px 4px 24px; font-weight: 600; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2); }
        .msg-ai { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px 24px 24px 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes reveal { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .anim-reveal { animation: reveal 0.4s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex">

    <aside id="sidebar" class="sidebar border-r border-white/5 bg-black flex flex-col z-50 overflow-hidden">
        <div class="p-8 flex items-center justify-between">
            <h1 class="text-2xl font-black tracking-tighter">Rouis<span class="text-amber-400">GPT</span></h1>
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-500">✕</button>
        </div>
        <div class="px-6 pb-6">
            <button onclick="window.location.reload()" class="w-full py-4 bg-white/5 hover:bg-amber-400 hover:text-black rounded-2xl transition-all font-bold text-xs tracking-widest uppercase">Nouvelle Session</button>
        </div>
        <div id="history-container" class="flex-1 overflow-y-auto px-6 space-y-3 no-scrollbar">
            </div>
        <div class="p-8">
            <button onclick="document.getElementById('setup').classList.remove('hidden')" class="text-[10px] text-gray-600 hover:text-amber-400 transition uppercase tracking-widest font-bold">Paramètres Système</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative min-w-0">
        <header class="h-20 flex items-center px-8 justify-between glass z-40">
            <button onclick="toggleSidebar()" class="p-3 hover:bg-white/5 rounded-xl transition text-amber-400">☰</button>
            <div class="flex flex-col items-center">
                <span class="text-[10px] font-bold text-gray-500 tracking-[0.4em] uppercase">Core_Neural_v4</span>
                <div id="status" class="flex items-center gap-1.5 mt-1">
                    <div class="w-1.5 h-1.5 rounded-full bg-amber-400 shadow-[0_0_8px_#fbbf24]"></div>
                    <span class="text-[9px] text-amber-400/80 font-bold uppercase">Online</span>
                </div>
            </div>
            <div class="w-10"></div>
        </header>

        <div id="chat-flow" class="flex-1 overflow-y-auto p-6 md:p-16 space-y-10 no-scrollbar">
            <div id="hero" class="h-full flex flex-col items-center justify-center text-center space-y-6 opacity-40">
                <div class="text-7xl font-thin tracking-tighter">∞</div>
                <h2 class="text-2xl font-light">L'intelligence sans limites.</h2>
            </div>
        </div>

        <div id="preview-box" class="hidden px-16 pb-4">
            <div class="relative inline-block">
                <img id="img-render" src="" class="h-32 rounded-3xl border border-amber-400/30 shadow-2xl">
                <button onclick="clearImage()" class="absolute -top-3 -right-3 bg-red-600 w-7 h-7 rounded-full text-sm">✕</button>
            </div>
        </div>

        <footer class="p-6 md:p-12 bg-gradient-to-t from-black via-black/80 to-transparent">
            <div class="max-w-5xl mx-auto glass rounded-[3rem] p-3 flex items-end gap-3 ring-1 ring-white/10 focus-within:ring-amber-400/30 transition-all shadow-2xl">
                <button onclick="document.getElementById('file-up').click()" class="p-4 text-gray-500 hover:text-amber-400 transition">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                </button>
                <input type="file" id="file-up" class="hidden" accept="image/*" onchange="previewImg(event)">
                
                <textarea id="user-prompt" rows="1" placeholder="Posez une question à l'IA..." class="flex-1 bg-transparent p-4 outline-none resize-none text-gray-200" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                
                <button id="send-btn" onclick="execute()" class="bg-amber-400 text-black h-14 px-10 rounded-[2rem] font-black uppercase text-[10px] tracking-widest hover:brightness-110 active:scale-95 transition-all shadow-lg">
                    Lancer
                </button>
            </div>
        </footer>
    </main>

    <div id="setup" class="fixed inset-0 bg-black/95 backdrop-blur-2xl z-[100] hidden flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-12 rounded-[4rem] text-center border-amber-400/10">
            <h3 class="text-3xl font-bold mb-8 italic text-amber-400">Accès Système</h3>
            <input type="password" id="api-key" class="w-full bg-white/5 border border-white/10 p-6 rounded-3xl outline-none focus:border-amber-400 text-center tracking-widest mb-6 transition" placeholder="VOTRE CLÉ API">
            <button onclick="saveSetup()" class="w-full bg-white text-black font-black py-6 rounded-3xl hover:bg-amber-400 transition duration-500 uppercase tracking-widest text-xs">Synchroniser</button>
        </div>
    </div>

    <script>
        let imgB64 = null;
        let history = JSON.parse(localStorage.getItem('rgpt_inf_hist')) || [];

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-ml-[300px]'); }
        function saveSetup() { 
            const k = document.getElementById('api-key').value.trim();
            if(k) { localStorage.setItem('rgpt_key', k); document.getElementById('setup').classList.add('hidden'); }
        }

        function previewImg(e) {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = (ev) => {
                imgB64 = ev.target.result;
                document.getElementById('img-render').src = imgB64;
                document.getElementById('preview-box').classList.remove('hidden');
            };
            r.readAsDataURL(f);
        }

        function clearImage() {
            imgB64 = null;
            document.getElementById('preview-box').classList.add('hidden');
            document.getElementById('file-up').value = '';
        }

        async function execute() {
            const input = document.getElementById('user-prompt');
            const prompt = input.value.trim();
            const key = localStorage.getItem('rgpt_key');
            if(!key) return document.getElementById('setup').classList.remove('hidden');
            if(!prompt && !imgB64) return;

            document.getElementById('hero').style.display = 'none';
            addBubble('user', prompt, imgB64);
            input.value = '';
            input.style.height = 'auto';
            const loadId = addLoading();
            const payloadImg = imgB64;
            clearImage();

            // Moteur Infinity : Teste plusieurs combinaisons pour éviter la 404
            const combinations = [
                {v: 'v1', m: 'gemini-1.5-flash'},
                {v: 'v1beta', m: 'gemini-1.5-flash'},
                {v: 'v1', m: 'gemini-pro'},
                {v: 'v1beta', m: 'gemini-pro'}
            ];

            let success = false;
            for (let combo of combinations) {
                if(success) break;
                try {
                    const url = `https://generativelanguage.googleapis.com/${combo.v}/models/${combo.m}:generateContent?key=${key}`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt || "Analyse l'image." },
                                    ...(payloadImg ? [{ inline_data: { mime_type: "image/jpeg", data: payloadImg.split(',')[1] } }] : [])
                                ]
                            }]
                        })
                    });
                    const data = await res.json();
                    if(!data.error) {
                        document.getElementById(loadId).remove();
                        addBubble('ai', data.candidates[0].content.parts[0].text);
                        saveToHistory(prompt || "Vision AI");
                        success = true;
                    }
                } catch(e) { console.log("Test échoué pour: " + combo.m); }
            }

            if(!success) {
                document.getElementById(loadId).innerHTML = `<div class="text-red-500 text-xs font-bold uppercase tracking-widest">Échec Total : Vérifiez votre clé API ou quota.</div>`;
            }
        }

        function addBubble(role, text, img) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} anim-reveal`;
            div.innerHTML = `
                <div class="max-w-[85%] p-6 ${role === 'user' ? 'msg-user' : 'msg-ai text-gray-200'}">
                    ${img ? `<img src="${img}" class="rounded-2xl mb-4 max-h-80 w-full object-cover shadow-lg">` : ''}
                    <p class="text-[15px] leading-relaxed whitespace-pre-wrap">${text}</p>
                </div>`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        function addLoading() {
            const id = 'l-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start animate-pulse";
            div.innerHTML = `<div class="msg-ai p-5 flex gap-1.5"><div class="w-2 h-2 bg-amber-400 rounded-full"></div><div class="w-2 h-2 bg-amber-400 rounded-full"></div><div class="w-2 h-2 bg-amber-400 rounded-full"></div></div>`;
            document.getElementById('chat-flow').appendChild(div);
            return id;
        }

        function saveToHistory(t) {
            history.unshift({t, d: new Date().toLocaleTimeString()});
            history = history.slice(0, 15);
            localStorage.setItem('rgpt_inf_hist', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const cont = document.getElementById('history-container');
            cont.innerHTML = history.map(h => `
                <div class="p-4 bg-white/5 rounded-2xl text-[11px] text-gray-400 border border-white/5 hover:border-amber-400/40 transition cursor-pointer truncate">
                    <span class="text-amber-400/50 mr-2">${h.d}</span> ${h.t}
                </div>
            `).join('');
        }

        window.onload = () => { renderHistory(); if(!localStorage.getItem('rgpt_key')) document.getElementById('setup').classList.remove('hidden'); };
    </script>
</body>
</html>
