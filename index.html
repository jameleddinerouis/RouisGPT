<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouisGPT | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #fbbf24; --deep-bg: #030712; }
        body { font-family: 'Inter', sans-serif; background-color: var(--deep-bg); color: #f9fafb; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(251, 191, 36, 0.1); }
        .glow-button { box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); transition: 0.3s; }
        .glow-button:hover { box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .float-anim { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="h-20 flex items-center justify-between px-10 border-b border-white/5 bg-black/40 backdrop-blur-md z-50">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-amber-400 rounded-2xl rotate-3 flex items-center justify-center text-black font-black text-xl shadow-[0_0_15px_rgba(251,191,36,0.5)]">R</div>
            <h1 class="text-2xl font-extrabold tracking-tighter">Rouis<span class="text-amber-400">GPT</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="localStorage.removeItem('rgpt_history'); location.reload();" class="text-[10px] tracking-widest text-gray-500 hover:text-red-400 transition uppercase">Reset System</button>
            <button onclick="openSettings()" class="w-10 h-10 flex items-center justify-center hover:bg-white/5 rounded-full transition">⚙️</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <div id="chat-flow" class="flex-1 overflow-y-auto p-6 md:p-20 space-y-10 no-scrollbar">
            <div id="welcome" class="h-full flex flex-col items-center justify-center text-center space-y-8 float-anim">
                <div class="text-7xl">🧠</div>
                <div>
                    <h2 class="text-5xl font-black mb-4">Initialisation de l'IA</h2>
                    <p class="text-gray-500 max-w-md mx-auto leading-relaxed">Système optimisé pour Rouis. Prêt à traiter des données complexes ou des analyses visuelles.</p>
                </div>
            </div>
        </div>

        <div id="img-preview-box" class="hidden px-20 pb-4">
            <div class="relative inline-block group">
                <img id="img-render" src="" class="h-32 rounded-3xl border-2 border-amber-400 shadow-2xl transition group-hover:brightness-50">
                <button onclick="clearImg()" class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 text-white font-bold transition">Retirer</button>
            </div>
        </div>

        <footer class="p-6 md:p-12">
            <div class="max-w-5xl mx-auto glass-card rounded-[2.5rem] p-3 flex items-end gap-4 focus-within:border-amber-400/50 transition-all duration-500">
                <button onclick="document.getElementById('upload').click()" class="p-4 text-gray-400 hover:text-amber-400 transition">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3-3-2 2-4-4-6 6"/></svg>
                </button>
                <input type="file" id="upload" class="hidden" accept="image/*" onchange="preview(event)">
                
                <textarea id="prompt" rows="1" placeholder="Demandez n'importe quoi..." class="flex-1 bg-transparent p-4 outline-none resize-none text-gray-100 placeholder:text-gray-700 font-medium" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                
                <button onclick="runIA()" class="bg-amber-400 text-black h-14 w-14 rounded-[1.5rem] flex items-center justify-center glow-button">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                </button>
            </div>
        </footer>
    </main>

    <div id="setup" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] hidden flex items-center justify-center p-6">
        <div class="w-full max-w-md glass-card p-10 rounded-[3rem] space-y-8 text-center border-amber-400/20">
            <h3 class="text-3xl font-black">Activation de la Clé</h3>
            <input type="password" id="key" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-amber-400 text-center tracking-widest transition" placeholder="VOTRE CLÉ GEMINI">
            <button onclick="save()" class="w-full bg-white text-black font-extrabold py-5 rounded-2xl hover:bg-amber-400 transition duration-500">DÉVERROUILLER ROUISGPT</button>
        </div>
    </div>

    <script>
        let imgData = null;

        function openSettings() { document.getElementById('setup').classList.remove('hidden'); }
        function save() {
            const k = document.getElementById('key').value.trim();
            if(k) { localStorage.setItem('rgpt_key', k); document.getElementById('setup').classList.add('hidden'); }
        }

        function preview(e) {
            const file = e.target.files[0];
            const r = new FileReader();
            r.onload = (ev) => {
                imgData = ev.target.result;
                document.getElementById('img-render').src = imgData;
                document.getElementById('img-preview-box').classList.remove('hidden');
            };
            r.readAsDataURL(file);
        }

        function clearImg() {
            imgData = null;
            document.getElementById('img-preview-box').classList.add('hidden');
            document.getElementById('upload').value = '';
        }

        async function runIA() {
            const pInput = document.getElementById('prompt');
            const txt = pInput.value.trim();
            const key = localStorage.getItem('rgpt_key');

            if(!key) return openSettings();
            if(!txt && !imgData) return;

            document.getElementById('welcome').style.display = 'none';
            addBubble('user', txt, imgData);
            pInput.value = '';
            const loadId = addLoading();
            const currentImg = imgData;
            clearImg();

            try {
                // Utilisation de la version v1 stable pour éviter l'erreur 404
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: txt || "Analyse de cette image." },
                                ...(currentImg ? [{ inline_data: { mime_type: "image/jpeg", data: currentImg.split(',')[1] } }] : [])
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const answer = data.candidates[0].content.parts[0].text;
                document.getElementById(loadId).remove();
                addBubble('model', answer);

            } catch (err) {
                document.getElementById(loadId).innerHTML = `<div class="text-red-400 text-[10px] font-mono">CRITICAL_ERROR: ${err.message}</div>`;
            }
        }

        function addBubble(role, text, img) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-pulse-once`;
            
            div.innerHTML = `
                <div class="${role === 'user' ? 'bg-amber-400 text-black' : 'glass-card text-gray-200'} p-6 rounded-[2.5rem] max-w-[85%] ${role === 'user' ? 'rounded-br-none' : 'rounded-tl-none'} shadow-xl">
                    ${img ? `<img src="${img}" class="rounded-3xl mb-4 max-h-80 w-full object-cover shadow-lg border border-black/20">` : ''}
                    <p class="text-[15px] leading-relaxed font-medium whitespace-pre-wrap">${text}</p>
                </div>
            `;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        function addLoading() {
            const id = 'l-' + Date.now();
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.id = id;
            div.innerHTML = `<div class="glass-card p-4 rounded-full flex gap-2 animate-pulse"><div class="w-2 h-2 bg-amber-400 rounded-full"></div><div class="w-2 h-2 bg-amber-400 rounded-full"></div><div class="w-2 h-2 bg-amber-400 rounded-full"></div></div>`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
